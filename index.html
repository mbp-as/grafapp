<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrafApp PWA</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --ios-blue: #007aff;
            --ios-light-gray: #d1d1d6;
            --ios-red-bg: #ffd6d6;
            --ios-red-icon: #ff3b30;
            --panel-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Основний контейнер (горизонтальний) */
        .main-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: #000;
            position: relative;
        }

        /* Ліва частина: Сітка 2x2 */
        .photo-grid {
            flex: 1.8;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
            padding: 2px;
            background: #444; /* Колір ліній розділення */
        }

        .grid-cell {
            background: #222;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .grid-cell:active { opacity: 0.8; }

        /* Права частина: Панель керування */
        .control-panel {
            flex: 1;
            background: var(--panel-bg);
            margin: 10px;
            margin-left: 0;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            justify-content: space-between;
        }

        /* Верхній ряд кнопок */
        .nav-header {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .btn-nav {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--ios-blue);
            border: none;
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .page-indicator {
            flex-grow: 1;
            height: 50px;
            border-radius: 25px;
            background: var(--ios-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
        }

        /* Центральна кнопка камери */
        .action-button {
            width: 100%;
            flex-grow: 0.6;
            margin: 20px 0;
            background: var(--ios-light-gray);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .action-button svg {
            width: 40px;
            height: 40px;
            fill: #333;
        }

        /* Кнопка кошика */
        .delete-button {
            width: 100%;
            height: 70px;
            background: var(--ios-red-bg);
            border-radius: 35px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .delete-button svg {
            width: 30px;
            height: 30px;
            fill: var(--ios-red-icon);
        }

        /* Статус-бар (імітація для краси) */
        .ios-status {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            color: white;
            display: flex;
            flex-direction: row-reverse;
            gap: 15px;
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="ios-status">
            <span>9:41</span>
            <span>📶</span>
            <span>🔋</span>
        </div>

        <div class="photo-grid" id="grid">
            <div class="grid-cell" id="cell-0"></div>
            <div class="grid-cell" id="cell-1"></div>
            <div class="grid-cell" id="cell-2"></div>
            <div class="grid-cell" id="cell-3"></div>
        </div>

        <div class="control-panel">
            <div class="nav-header">
                <button class="btn-nav">←</button>
                <div class="page-indicator">1</div>
                <button class="btn-nav">→</button>
            </div>

            <button class="action-button" id="uploadTrigger">
                <svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
            </button>

            <button class="delete-button" id="clearGrid">
                <svg viewBox="0 0 24 24"><path d="M9 3v1H4v2h1v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h1V4h-5V3H9m2 2h2v1h-2V5m-4 3h10v11H7V8m2 2v7h2v-7H9m4 0v7h2v-7h-2z"/></svg>
            </button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*">

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadTrigger = document.getElementById('uploadTrigger');
        const clearBtn = document.getElementById('clearGrid');
        const cells = document.querySelectorAll('.grid-cell');
        
        let currentCellIndex = 0;

        // Відкриття камери/галереї
        uploadTrigger.addEventListener('click', () => {
            fileInput.click();
        });

        // Обробка вибраного фото
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    cells[currentCellIndex].style.backgroundImage = `url(${event.target.result})`;
                    // Автоматично переходимо до наступної клітинки
                    currentCellIndex = (currentCellIndex + 1) % cells.length;
                };
                reader.readAsDataURL(file);
            }
        });

        // Очищення сітки
        clearBtn.addEventListener('click', () => {
            if(confirm('Очистити всі фото?')) {
                cells.forEach(cell => cell.style.backgroundImage = 'none');
                currentCellIndex = 0;
            }
        });

        // Реєстрація Service Worker для PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(console.error);
            });
        }
    </script>
</body>
</html>
