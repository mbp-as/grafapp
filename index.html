<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrafApp Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --ios-blue: #007aff;
            --ios-light-gray: #e5e5ea;
            --ios-red-bg: #ffd6d6;
            --ios-red-icon: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Ліва частина: Видошукач */
        .viewport {
            flex: 2.5; /* Збільшено відносно правої панелі */
            position: relative;
            background: #222;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Дзеркальне відображення для селфі */
        }

        /* Шар для накладання зображення (graf) */
        #overlayImage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none; /* Щоб не заважало клікам */
            z-index: 10;
            opacity: 0.8;
        }

        /* Полотно для збереженого фото */
        #photoCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            z-index: 20;
            object-fit: cover;
        }

        /* Права частина: Вужча панель */
        .control-panel {
            flex: 0.8; 
            background: white;
            margin: 12px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            justify-content: space-between;
            z-index: 30;
        }

        .nav-header {
            display: flex;
            width: 100%;
            justify-content: space-between;
            gap: 8px;
        }

        .btn-nav {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--ios-blue);
            border: none; color: white;
            font-size: 20px; cursor: pointer;
        }

        .page-indicator {
            flex-grow: 1; height: 44px;
            border-radius: 22px;
            background: var(--ios-blue);
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 600;
        }

        .action-button {
            width: 100%; height: 140px;
            background: var(--ios-light-gray);
            border-radius: 30px;
            border: none; cursor: pointer;
        }

        .delete-button {
            width: 100%; height: 60px;
            background: var(--ios-red-bg);
            border-radius: 30px;
            border: none; cursor: pointer;
        }

        svg { width: 32px; height: 32px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="viewport">
            <video id="videoElement" autoplay playsinline></video>
            <img id="overlayImage" src="graf0.png" alt="graf overlay">
            <canvas id="photoCanvas"></canvas>
        </div>

        <div class="control-panel">
            <div class="nav-header">
                <button class="btn-nav" onclick="changeGraf(-1)">←</button>
                <div class="page-indicator" id="grafNum">0</div>
                <button class="btn-nav" onclick="changeGraf(1)">→</button>
            </div>

            <button class="action-button" id="snap">
                <svg viewBox="0 0 24 24" fill="#333"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
            </button>

            <button class="delete-button" id="reset">
                <svg viewBox="0 0 24 24" fill="var(--ios-red-icon)"><path d="M9 3v1H4v2h1v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h1V4h-5V3H9m2 2h2v1h-2V5m-4 3h10v11H7V8m2 2v7h2v-7H9m4 0v7h2v-7h-2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('photoCanvas');
        const overlay = document.getElementById('overlayImage');
        const grafNumDisplay = document.getElementById('grafNum');
        
        let currentGraf = 0;
        const totalGrafs = 10; // Скільки у тебе файлів graf

        // 1. Запуск камери
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Потрібен доступ до камери: " + err);
            }
        }

        // 2. Перемикання оверлеїв (graf0, graf1...)
        function changeGraf(step) {
            currentGraf += step;
            if (currentGraf < 0) currentGraf = totalGrafs - 1;
            if (currentGraf >= totalGrafs) currentGraf = 0;
            
            grafNumDisplay.innerText = currentGraf;
            overlay.src = `graf${currentGraf}.png`;
        }

        // 3. Зробити фото (Snap)
        document.getElementById('snap').addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Малюємо відео (дзеркально, якщо треба)
            context.save();
            context.scale(-1, 1);
            context.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            context.restore();

            // Малюємо оверлей поверх
            const img = new Image();
            img.src = overlay.src;
            img.onload = () => {
                context.drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.style.display = 'block';
                video.style.display = 'none';
            };
        });

        // 4. Скидання
        document.getElementById('reset').addEventListener('click', () => {
            canvas.style.display = 'none';
            video.style.display = 'block';
        });

        window.onload = initCamera;
    </script>
</body>
</html>
