<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrafApp Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --ios-blue: #007aff;
            --ios-light-gray: #e5e5ea;
            --ios-red-bg: #ffd6d6;
            --ios-red-icon: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; }

        .main-container { display: flex; width: 100vw; height: 100vh; }

        /* Ліва частина: Камера */
        .viewport {
            flex: 2.5; position: relative; background: #000;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        #videoElement { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        #overlayImage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; z-index: 10; opacity: 0.9; }
        #photoCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 20; object-fit: cover; }

        /* Права панель */
        .control-panel {
            flex: 1; background: #fff; margin: 15px; border-radius: 45px;
            display: flex; flex-direction: column; padding: 20px; gap: 12px; position: relative;
        }

        .nav-header { display: flex; width: 100%; justify-content: space-between; gap: 10px; }
        .btn-blue { width: 55px; height: 55px; border-radius: 50%; background: var(--ios-blue); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-blue img { width: 24px; filter: brightness(0) invert(1); } /* arror.svg */
        
        .page-indicator { flex-grow: 1; height: 55px; border-radius: 28px; background: var(--ios-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; }

        /* Контейнери меню */
        #mainMenu, #settingsPanel { display: flex; flex-direction: column; gap: 12px; height: 100%; width: 100%; }
        #settingsPanel { display: none; overflow-y: auto; }

        .btn-action { width: 100%; flex: 1.5; background: var(--ios-light-gray); border-radius: 35px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-action img { width: 45px; } /* camera.svg */

        .row { display: flex; gap: 12px; flex: 0.8; }
        .btn-secondary { flex: 1; background: var(--ios-light-gray); border-radius: 30px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-secondary img { width: 32px; } /* settings.svg / camflip.svg */

        .btn-delete { width: 100%; height: 75px; background: var(--ios-red-bg); border-radius: 35px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-delete img { width: 30px; } /* delete.svg */

        /* Елементи налаштувань */
        .setting-row { display: flex; gap: 8px; width: 100%; }
        .btn-option { flex: 1; padding: 15px 5px; background: var(--ios-light-gray); border: none; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-option img { width: 24px; }
        .btn-back { background: var(--ios-blue); color: white; border-radius: 25px; padding: 15px; margin-top: auto; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="viewport">
            <video id="videoElement" autoplay playsinline></video>
            <img id="overlayImage" src="graf0.png">
            <canvas id="photoCanvas"></canvas>
        </div>

        <div class="control-panel">
            <div class="nav-header">
                <button class="btn-blue" onclick="changeGraf(-1)"><img src="arror.svg" style="transform: rotate(0deg);"></button>
                <div class="page-indicator" id="grafNum">1</div>
                <button class="btn-blue" onclick="changeGraf(1)"><img src="arror1.svg"></button>
            </div>

            <div id="mainMenu">
                <button class="btn-action" onclick="takeSnapshot()">
                    <img src="camera.svg">
                </button>
                <div class="row">
                    <button class="btn-secondary" onclick="toggleSettings()"><img src="settings.svg"></button>
                    <button class="btn-secondary" onclick="switchCamera()"><img src="camflip.svg"></button>
                </div>
                <button class="btn-delete" onclick="resetView()">
                    <img src="delete.svg">
                </button>
            </div>

            <div id="settingsPanel">
                <div class="setting-row">
                    <button class="btn-option" onclick="setLens('wide')"><img src="05.svg"></button>
                    <button class="btn-option" onclick="setLens('normal')"><img src="1x.svg"></button>
                </div>
                <button class="btn-option" onclick="rotate90()"><img src="camrot.svg" style="margin-right:8px;"> Обернути 90°</button>
                <button class="btn-option" onclick="toggleMirror()">Відзеркалити</button>
                
                <p style="text-align:center; font-size:12px; margin:5px 0; color:#888;">Якість запису</p>
                <div class="setting-row">
                    <button class="btn-option" onclick="setRes(5)">5MP</button>
                    <button class="btn-option" onclick="setRes(12)">12MP</button>
                    <button class="btn-option" onclick="setRes(24)">24MP</button>
                </div>
                
                <button class="btn-back" onclick="toggleSettings()">ГОТОВО</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoElement');
        const overlay = document.getElementById('overlayImage');
        const grafLabel = document.getElementById('grafNum');
        let currentGraf = 0;
        let isFront = false;
        let rotation = 0;
        let mirrored = false;

        // Запуск камери
        async function startCam() {
            const constraints = {
                video: { 
                    facingMode: isFront ? "user" : "environment",
                    width: { ideal: 4032 }, height: { ideal: 3024 }
                }
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (e) { console.error("Camera error:", e); }
        }

        function switchCamera() {
            isFront = !isFront;
            startCam();
        }

        function toggleSettings() {
            const mm = document.getElementById('mainMenu');
            const sp = document.getElementById('settingsPanel');
            const isOpen = mm.style.display === 'none';
            mm.style.display = isOpen ? 'flex' : 'none';
            sp.style.display = isOpen ? 'none' : 'flex';
        }

        function changeGraf(dir) {
            currentGraf = (currentGraf + dir + 10) % 10;
            grafLabel.innerText = currentGraf;
            overlay.src = `graf${currentGraf}.png`;
        }

        function rotate90() {
            rotation = (rotation + 90) % 360;
            applyTrans();
        }

        function toggleMirror() {
            mirrored = !mirrored;
            applyTrans();
        }

        function applyTrans() {
            video.style.transform = `rotate(${rotation}deg) scaleX(${mirrored ? -1 : 1})`;
        }

        function takeSnapshot() {
            const canvas = document.getElementById('photoCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate(rotation * Math.PI / 180);
            if(mirrored) ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width/2, -canvas.height/2, canvas.width, canvas.height);
            ctx.restore();

            const grafImg = new Image();
            grafImg.src = overlay.src;
            grafImg.onload = () => {
                ctx.drawImage(grafImg, 0, 0, canvas.width, canvas.height);
                canvas.style.display = 'block';
            };
        }

        function resetView() {
            document.getElementById('photoCanvas').style.display = 'none';
        }

        window.onload = startCam;
    </script>
</body>
</html>
